<!DOCTYPE html>
<!--
  © 2026 Tyler Janczak. All rights reserved.
  404 page — served by GitHub Pages when a URL is not found.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error — Tyler Janczak</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23F7F4EE'/%3E%3Ctext x='16' y='22' font-family='Georgia' font-size='16' font-weight='400' text-anchor='middle' fill='%236B1F1F'%3ETNJ%3C/text%3E%3C/svg%3E" />
  <meta name="description" content="Error — the page you were looking for could not be found." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #F7F4EE;
      --bg-subtle: #EFEAE0;
      --ink: #1B1B1B;
      --ink-soft: #4A4A48;
      --rule: #D9D2C4;
      --accent: #6B1F1F;
      --error-red: #B21F1F;
      --display: "Fraunces", Georgia, serif;
      --body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ============================================
       DOODLE BACKGROUND (Epic Hyperspace style)
       Subtle repeating pattern of rockets, stars,
       planets, and swirls — inspired by Epic's
       classic error screen but stays on-brand
       ============================================ */
    body {
      background-color: var(--bg);
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320' viewBox='0 0 320 320'><g fill='none' stroke='%236B1F1F' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round' opacity='0.18'><path d='M40 60 Q 50 40 60 60 L 55 90 Q 50 100 45 90 Z'/><circle cx='52' cy='70' r='2' fill='%236B1F1F' stroke='none'/><path d='M85 55 L 88 62 L 95 63 L 90 68 L 91 75 L 85 71 L 79 75 L 80 68 L 75 63 L 82 62 Z'/><ellipse cx='150' cy='45' rx='20' ry='6' transform='rotate(-15 150 45)'/><circle cx='150' cy='45' r='10'/><path d='M220 80 Q 230 60 240 80 L 235 110 Q 230 120 225 110 Z'/><circle cx='232' cy='90' r='2' fill='%236B1F1F' stroke='none'/><path d='M280 40 L 283 47 L 290 48 L 285 53 L 286 60 L 280 56 L 274 60 L 275 53 L 270 48 L 277 47 Z'/><path d='M60 160 Q 65 155 68 160 Q 71 165 68 170 Q 65 175 60 170 Q 57 165 60 160 M 68 160 Q 72 150 76 160 M 60 170 Q 55 175 52 170'/><circle cx='120' cy='150' r='4'/><path d='M115 150 L 125 150 M 120 145 L 120 155' stroke-width='0.6'/><path d='M180 170 L 200 155 L 220 170 Q 200 190 180 170 Z'/><circle cx='200' cy='170' r='4' fill='%236B1F1F' stroke='none'/><path d='M275 155 L 278 162 L 285 163 L 280 168 L 281 175 L 275 171 L 269 175 L 270 168 L 265 163 L 272 162 Z'/><path d='M40 250 Q 45 245 48 250 Q 51 255 48 260 Q 45 265 40 260 Q 37 255 40 250 M 48 250 Q 52 240 56 250 M 40 260 Q 35 265 32 260'/><path d='M100 240 Q 110 220 120 240 L 115 270 Q 110 280 105 270 Z'/><circle cx='112' cy='250' r='2' fill='%236B1F1F' stroke='none'/><path d='M170 245 L 173 252 L 180 253 L 175 258 L 176 265 L 170 261 L 164 265 L 165 258 L 160 253 L 167 252 Z'/><ellipse cx='240' cy='260' rx='16' ry='5' transform='rotate(10 240 260)'/><circle cx='240' cy='260' r='8'/><circle cx='290' cy='245' r='3' fill='%236B1F1F' stroke='none'/></g></svg>");
      background-repeat: repeat;
      background-size: 320px 320px;
      position: relative;
    }

    /* Soft glow in the center, like a faded highlight */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(247, 244, 238, 0.6) 0%, rgba(247, 244, 238, 0) 60%);
      pointer-events: none;
      z-index: 1;
    }

    /* ============================================
       ERROR CARD
       ============================================ */
    .error-container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .error-card {
      background: var(--bg);
      max-width: 520px;
      width: 100%;
      padding: 48px 44px;
      border-radius: 6px;
      border: 1px solid var(--rule);
      box-shadow:
        0 1px 3px rgba(27, 27, 27, 0.04),
        0 12px 40px rgba(27, 27, 27, 0.08);
      text-align: left;
    }

    .error-heading {
      font-family: var(--display);
      font-weight: 500;
      font-size: 42px;
      line-height: 1;
      color: var(--error-red);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .error-message {
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink-soft);
      margin-bottom: 36px;
    }

    /* ============================================
       BACK BUTTON (matches Epic Discontinue style
       from subpages)
       ============================================ */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #D93838;
      text-decoration: none;
      border: 1px solid #D93838;
      border-radius: 999px;
      padding: 4px 20px 4px 4px;
      background: var(--bg);
      transition: all 0.2s ease;
    }

    .back-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #D93838;
      color: var(--bg);
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    .back-icon svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .back-link:hover {
      background: rgba(217, 56, 56, 0.06);
      transform: translateY(-1px);
      box-shadow: 0 0 0 3px rgba(217, 56, 56, 0.15);
    }

    .back-link:hover .back-icon {
      transform: translateX(-2px);
    }

    /* ============================================
       Small footer signature — quietly branded
       ============================================ */
    .card-footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      font-family: var(--display);
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .card-footer span.mark {
      color: var(--ink);
      font-weight: 500;
    }

    /* ============================================
       Responsive
       ============================================ */
    @media (max-width: 540px) {
      .error-card {
        padding: 36px 28px;
      }
      .error-heading {
        font-size: 34px;
      }
      .error-message {
        font-size: 14px;
      }
      body {
        background-size: 260px 260px;
      }
    }
  </style>
</head>

<body>

  <div class="error-container">
    <div class="error-card">
      <h1 class="error-heading">Error</h1>
      <p class="error-message">
        The page doesn't exist on this client. Please try again later.
      </p>

      <a href="/" class="back-link">
        <span class="back-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M7 12 L11 8 M7 12 L11 16 M7 12 L14 12 A4 4 0 0 1 18 16 L18 19"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"/>
          </svg>
        </span>
        Back to Home
      </a>

      <div class="card-footer">
        © 2026 <span class="mark">Tyler Janczak</span>
      </div>
    </div>
  </div>

</body>
</html>
