  <style>
    :root {
      --bg: #FBFBFB;
      --card-bg: #FFFFFF;
      --ink: #1B1B1B;
      --ink-soft: #4A4A48;
      --rule: #E5E5E5;
      --accent: #6B1F1F;
      --error-red: #B21F1F;
      --display: "Fraunces", Georgia, serif;
      --body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ============================================
       EPIC HYPERSPACE-STYLE DOODLE BACKGROUND

 370 L110 370 L110 366 Q107 366 105 363 Z M103 352 L107 349 M125 352 L128 349'/></g><g stroke='none'><path d='M240 155 Q240 150 245 149 L255 149 Q260 150 260 155 L260 163 Q258 166 256 166 L255 170 L253 170 L253 166 L247 166 L247 170 L245 170 L245 166 Q242 166 240 163 Z M238 152 L242 149 M260 152 L263 149'/></g><!-- sheep (silhouette blob) --><g stroke='none'><path d='M330 275 Q325 268 335 265 Q340 262 348 265 Q356 262 361 268 Q368 272 363 280 Q368 285 360 288 L358 292 L355 292 L355 288 L340 288 L340 292 L337 292 L337 288 Q327 285 330 275 Z'/></g><g stroke='none'><path d='M55 430 Q50 423 60 420 Q65 417 73 420 Q81 417 86 423 Q93 427 88 435 Q93 440 85 443 L83 447 L80 447 L80 443 L65 443 L65 447 L62 447 L62 443 Q52 440 55 430 Z'/></g><!-- birds / ducks --><g stroke-width='1.2' fill='none'><path d='M180 60 Q185 55 190 60 Q195 65 200 60 M188 60 L188 68 M185 70 L191 70'/></g><g stroke-width='1.2' fill='none'><path d='M25 175 Q30 170 35 175 Q40 180 45 175 M33 175 L33 183 M30 185 L36 185'/></g><g stroke-width='1.2' fill='none'><path d='M405 55 Q410 50 415 55 Q420 60 425 55 M413 55 L413 63 M410 65 L416 65'/></g></g></svg>");
      background-repeat: repeat;
      background-size: 480px 480px;
      position: relative;
    }

    /* Soft radial glow to lighten the middle */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(251, 251, 251, 0.6) 0%, rgba(251, 251, 251, 0) 70%);
      pointer-events: none;
      z-index: 1;
    }

    /* ============================================
       ERROR CARD
       ============================================ */
    .error-container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .error-card {
      background: var(--card-bg);
      max-width: 520px;
      width: 100%;
      padding: 48px 44px;
      border-radius: 6px;
      border: 1px solid var(--rule);
      box-shadow:
        0 1px 3px rgba(27, 27, 27, 0.04),
        0 12px 40px rgba(27, 27, 27, 0.08);
      text-align: left;
    }

    .error-heading {
      font-family: var(--display);
      font-weight: 500;
      font-size: 42px;
      line-height: 1;
      color: var(--error-red);
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    .error-message {
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink-soft);
      margin-bottom: 36px;
    }

    /* ============================================
       BACK BUTTON (matches Epic Discontinue style)
       ============================================ */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #D93838;
      text-decoration: none;
      border: 1px solid #D93838;
      border-radius: 999px;
      padding: 4px 20px 4px 4px;
      background: var(--card-bg);
      transition: all 0.2s ease;
    }

    .back-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #D93838;
      color: var(--card-bg);
      flex-shrink: 0;
      transition: transform 0.2s ease;
    }

    .back-icon svg {
      width: 22px;
      height: 22px;
      display: block;
    }

    .back-link:hover {
      background: rgba(217, 56, 56, 0.06);
      transform: translateY(-1px);
      box-shadow: 0 0 0 3px rgba(217, 56, 56, 0.15);
    }

    .back-link:hover .back-icon {
      transform: translateX(-2px);
    }

    /* ============================================
       Copyright footer
       ============================================ */
    .card-footer {
      margin-top: 40px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      font-family: var(--display);
      font-size: 11px;
      color: var(--ink-soft);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .card-footer span.mark {
      color: var(--ink);
      font-weight: 500;
    }

    /* ============================================
       Responsive
       ============================================ */
    @media (max-width: 540px) {
      .error-card {
        padding: 36px 28px;
      }
      .error-heading {
        font-size: 34px;
      }
      .error-message {
        font-size: 14px;
      }
      body {
        background-size: 380px 380px;
      }
    }
  </style>

</head>

<body>

  <div class="error-container">
    <div class="error-card">
      <h1 class="error-heading">Error</h1>
      <p class="error-message">
        The page doesn't exist on this client. Please try again later.
      </p>

      <a href="/" class="back-link">
        <span class="back-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M7 12 L11 8 M7 12 L11 16 M7 12 L14 12 A4 4 0 0 1 18 16 L18 19"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"/>
          </svg>
        </span>
        Back to Home
      </a>

      <div class="card-footer">
        © 2026 <span class="mark">Tyler Janczak</span>
      </div>
    </div>
  </div>

</body>
</html>
